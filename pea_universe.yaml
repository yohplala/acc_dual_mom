# Amundi PEA-eligible UCITS ETF discovery universe.
#
# Authoritative list of all Amundi PEA-eligible ETFs (from Amundi's public
# product list, ~110 entries). Used by `pea-mom discover` to fetch closing
# prices for ALL of them, and by the correlation-matrix renderer to find
# redundant exposures and best-in-group representatives.
#
# This list is INDEPENDENT of `strategies.yaml` — strategies.yaml lists assets
# that are actively in a momentum strategy; this file lists every PEA-eligible
# Amundi ETF for discovery. There's overlap on the assets we use, but the
# discovery universe is much wider.
#
# Yahoo tickers are filled in for the assets we already use plus the major
# well-known ones. Entries with `yahoo: null` are skipped at fetch time
# with a warning — fill them in iteratively as you find them.
#
# Schema per entry:
#   id           short slug for tables
#   name         full Amundi product name
#   isin         ISIN code
#   currency     EUR | USD | CHF | GBP
#   ter_pct      management fee (Amundi's "Frais de gestion")
#   sfdr         Article 6 | Article 8
#   category     descriptif geographic/sector tag
#   yahoo        yfinance ticker; null if unknown (skipped on fetch)
#   leveraged    true if 2x / -1x / -2x — these distort correlation,
#                rendered separately on the heatmap
#   amundi_url   optional override for the product page URL on
#                amundietf.fr; if absent, derived from name + isin

universe:
  # ─── World / global ────────────────────────────────────────────────
  - { id: world_msci_swap_acc,  name: Amundi MSCI World Swap UCITS ETF EUR Acc,    isin: LU1681043599, currency: EUR, ter_pct: 0.38, sfdr: Article 6, category: World,        yahoo: CW8.PA }
  - { id: world_msci_swap_dist, name: Amundi MSCI World Swap UCITS ETF EUR Dist,   isin: LU2655993207, currency: EUR, ter_pct: 0.38, sfdr: Article 6, category: World,        yahoo: null }
  - { id: world_msci_swap_usd,  name: Amundi MSCI World Swap UCITS ETF USD Acc,    isin: LU1681043672, currency: USD, ter_pct: 0.38, sfdr: Article 6, category: World,        yahoo: null }
  - id: world
    name: Amundi PEA Monde (MSCI World) UCITS ETF
    isin: FR001400U5Q4
    yahoo: DCAM.PA
    currency: EUR
    ter_pct: 0.20
    sfdr: Article 6
    category: World
    est_spread_bps: 10
    replication: synthetic
    inception: 2025-03-04
    # Multi-stage proxy chain, cleanest first. Each successor extends the
    # previous segment's pre-handoff history by being level-rescaled to
    # match at the predecessor's first available date — keeps the
    # cleanest proxy active for as long as possible, only falls back to
    # the dirtier proxies for the earlier history they uniquely provide.
    index_proxy_chain:
      # Cleanest: same fund family as the live ETF, EUR-quoted, accumulating.
      - { ticker: IWDA.AS, kind: eur_tr }   # iShares Core MSCI World UCITS Acc EUR, since 2009-09-25
      # +9 months: same fund, distributing share class, USD-quoted (FX-converted).
      - { ticker: IWRD.L,  kind: usd_tr }   # iShares MSCI World UCITS Dist USD LSE, since 2009-01-02
      # +1.5 years: MSCI All-Country World (~12% EM contamination vs MSCI World), captures
      # the 2008 Lehman peak. Composition drift is real but acceptable for a pre-2009
      # crisis-era proxy where every developed equity moved with EM in lockstep.
      - { ticker: ACWI,    kind: usd_tr }   # iShares MSCI ACWI ETF, NASDAQ, since 2008-03-28
  - { id: world_dj_industrial,  name: Amundi PEA Dow Jones Industrial Average,      isin: LU2572256662, currency: USD, ter_pct: 0.45, sfdr: Article 6, category: USA,          yahoo: null }
  - { id: world_lev_2x,         name: Amundi MSCI World (2x) Leveraged UCITS ETF,   isin: FR0014010HV4, currency: USD, ter_pct: 0.60, sfdr: Article 6, category: Leveraged-World, yahoo: null, leveraged: true }
  - { id: world_pea_luxe,       name: Amundi PEA Luxe Monde UCITS ETF Acc,          isin: FR001400S9V0, currency: EUR, ter_pct: 0.30, sfdr: Article 6, category: World-Luxury,  yahoo: null }

