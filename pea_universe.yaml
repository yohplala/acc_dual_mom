  - id: topix
    name: Amundi PEA Japon (TOPIX) EUR Acc
    isin: FR0013411980
    yahoo: PTPXE.PA
    currency: EUR
    ter_pct: 0.20
    sfdr: Article 6
    category: Japan
    est_spread_bps: 30                    # satellite, low AUM
    replication: synthetic
    inception: 2019-04-25
    index_proxy: EWJ                      # iShares MSCI Japan ETF, NYSE Arca, since 1996-03-12
    index_proxy_kind: usd_tr
    # MSCI Japan TR (proxy) ≈ TOPIX TR (live ETF) — same family that
    # topix_hedged uses via IJPE.L, so hedged/unhedged stay apples-to-apples.
    # USD-listed: EURUSD-converted price gives the EUR-investor unhedged
    # exposure (full JPY pass-through), matching the live ETF's semantics.
  - id: topix_hedged
    name: Amundi PEA Japon (TOPIX) EUR Hedged Acc
    isin: FR0013411998
    yahoo: PTPXH.PA
    currency: EUR
    ter_pct: 0.48
    sfdr: Article 6
    category: Japan-Hedged
    amundi_url: 'https://www.amundietf.fr/fr/particuliers/produits/equity/amundi-etf-pea-japan-topix-ucits-etf-daily-hedged-eur/fr0013411998'
    est_spread_bps: 30                    # satellite, hedged share class, low AUM
    replication: synthetic
    inception: 2019-04-25
    # Multi-stage chain, cleanest first. IJPE.L (real EUR-hedged Japan ETF)
    # only goes back to 2010-09-30 — pre-2010 EUR-hedged Japan ETFs simply
    # don't exist. The `eur_hedged_jp` synth recipe (see fetch.py) extends
    # history back via L = (EWJ * USDJPY) * (estr/estr_0): the (EWJ * USDJPY)
    # product strips out unhedged EWJ's JPY/USD FX exposure, leaving JPY-
    # denominated equity returns; the €STR carry term adds the EUR short-
    # rate compounding (with EONIA splice pre-2019). Implicitly assumes
    # r_JPY ≈ 0 — accurate pre-2010 (BOJ ZIRP since 1999), drifts ~80bp/yr
    # post-2015 — but the chain only uses the synthetic for the pre-
    # 2010-09 stub where the assumption is best.
    index_proxy_chain:
