    est_spread_bps: 30                    # satellite, hedged share class, low AUM
    replication: synthetic
    inception: 2019-04-25
    # Multi-stage chain, cleanest first. IJPE.L (real EUR-hedged Japan ETF)
    # only goes back to 2010-09-30 — pre-2010 EUR-hedged Japan ETFs simply
    # don't exist. The `eur_hedged_jp` synth recipe (see fetch.py) extends
    # history back via L = (EWJ * USDJPY) * (estr/estr_0): the (EWJ * USDJPY)
    # product strips out unhedged EWJ's JPY/USD FX exposure, leaving JPY-
    # denominated equity returns; the €STR carry term adds the EUR short-
    # rate compounding (with EONIA splice pre-2019). Implicitly assumes
    # r_JPY ≈ 0 — accurate pre-2010 (BOJ ZIRP since 1999), drifts ~80bp/yr
    # post-2015 — but the chain only uses the synthetic for the pre-
    # 2010-09 stub where the assumption is best.
    index_proxy_chain:
      - { ticker: IJPE.L, kind: eur_tr }            # since 2010-09-30
      - { ticker: eur_hedged_jp, kind: synth }       # since 1996 via EWJ + USDJPY + ECB
