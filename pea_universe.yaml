# Amundi PEA-eligible UCITS ETF discovery universe.
#
# Authoritative list of all Amundi PEA-eligible ETFs (from Amundi's public
# product list, ~110 entries). Used by `pea-mom discover` to fetch closing
# prices for ALL of them, and by the correlation-matrix renderer to find
# redundant exposures and best-in-group representatives.
#
# This list is INDEPENDENT of `strategies.yaml` — strategies.yaml lists assets
# that are actively in a momentum strategy; this file lists every PEA-eligible
# Amundi ETF for discovery. There's overlap on the assets we use, but the
# discovery universe is much wider.
#
# Yahoo tickers are filled in for the assets we already use plus the major
# well-known ones. Entries with `yahoo: null` are skipped at fetch time
# with a warning — fill them in iteratively as you find them.
#
# Schema per entry:
#   id           short slug for tables
#   name         full Amundi product name
#   isin         ISIN code
#   currency     EUR | USD | CHF | GBP
#   ter_pct      management fee (Amundi's "Frais de gestion")
#   sfdr         Article 6 | Article 8
#   category     descriptif geographic/sector tag
#   yahoo        yfinance ticker; null if unknown (skipped on fetch)
#   leveraged    true if 2x / -1x / -2x — these distort correlation,
#                rendered separately on the heatmap
#   amundi_url   optional override for the product page URL on
#                amundietf.fr; if absent, derived from name + isin

