# PEA Accelerated Dual Momentum — strategy configurations.
#
# Shared scoring / allocation / cost / execution settings live under `shared`.
# Per-strategy entries pick a slice of the universe and a rebalance cadence.
#
# Yahoo tickers marked "UNVERIFIED" need to be confirmed against actual
# yfinance data on first fetch. The fetcher fails loudly on invalid symbols.

shared:
  scoring:
    # Lookback windows in trading days, averaged with `aggregation`.
    # 21 ≈ 1 month, 63 ≈ 3 months, 126 ≈ 6 months.
    lookbacks_days: [21, 63, 126]
    aggregation: mean

  allocation:
    rule: score_proportional      # w_i = s_i / sum(s_j) over selected
    granularity_pct: 10           # round weights to 10% steps
    rounding: largest_remainder   # Hare quota for fair rounding

  filter:
    type: absolute_momentum
    benchmark: safe_asset         # candidate score must beat safe-asset score

  costs:
    per_trade_pct: 0.10           # one-way; covers IB tiered + bid-ask

  execution:
    # Sunday-anchored cadence: signal uses preceding Friday close,
    # fill at following Monday close (one trading-day lag, no lookahead).
    signal_close: friday
    fill_close: monday

universe:
  assets:
    - id: us_large
      name: Amundi PEA S&P 500
      isin: FR0011871128
      yahoo: PSP5.PA
      ter_pct: 0.12
      replication: synthetic
      region: us
      inception: 2014-04-29
      index_proxy: CSPX.AS                  # iShares Core S&P 500 UCITS ETF
      index_proxy_kind: eur_tr              # USD-base (IE00B5BMR087) but EUR-
                                            # quoted on Amsterdam (no FX needed),
                                            # accumulating, since 2010-05-19.
                                            # Loses pre-2010 history vs ^GSPC
                                            # but TR matches live ETF (no
                                            # ~2pp/yr PR understatement).

    - id: us_small
      name: Amundi Russell 2000
      isin: LU1681038672
      yahoo: RS2K.PA
      ter_pct: 0.35
      replication: synthetic
      region: us
      inception: 2017-09-21
      index_proxy: IWM                      # iShares Russell 2000 ETF — US-
      index_proxy_kind: usd_tr              # listed (USD), distributing but
                                            # auto_adjust=True in fetcher gives
                                            # TR-equivalent close. Since 2000.

    - id: world
      name: Amundi PEA Monde (MSCI World)
      isin: FR001400U5Q4
      yahoo: DCAM.PA              # launched 2025-03-04 — short native history
      ter_pct: 0.20
      replication: synthetic
      region: world
      inception: 2025-03-04
      index_proxy: IWDA.AS                  # iShares Core MSCI World UCITS ETF
      index_proxy_kind: eur_tr              # EUR-quoted accumulating (TR via
                                            # NAV reinvestment), since
                                            # 2009-09-25. Loses 2008 GFC vs the
                                            # old ^990100-USD-STRD proxy but TR
                                            # matches the live ETF (no ~2pp/yr
                                            # understatement).

    - id: eu_broad
      name: Amundi PEA MSCI Europe
      isin: FR0013412038
      yahoo: PCEU.PA
      ter_pct: 0.15
      replication: synthetic
      region: europe
      inception: 2018-12-12
      index_proxy: IMEU.AS                  # iShares Core MSCI Europe UCITS ETF
      index_proxy_kind: eur_tr              # EUR Dist on Amsterdam, since
                                            # 2007-07-06. Distributing, but
                                            # auto_adjust=True gives TR-
                                            # equivalent close. Loses pre-2007
                                            # history but exactly tracks the
                                            # MSCI Europe net total return.

    - id: eu_small
      name: Amundi MSCI EMU Small Cap ESG Broad Transition
      isin: LU1598689153
      yahoo: MMS.PA
      ter_pct: 0.40
      replication: physical
      region: eurozone
      inception: 2024-02-08
      index_proxy: SXRJ.DE                  # iShares MSCI EMU Small Cap UCITS
      index_proxy_kind: eur_tr              # ETF EUR Acc on Xetra, since
                                            # 2009-07-01. Proxies the parent
                                            # vanilla MSCI EMU Small Cap
                                            # (the Amundi product is the ESG
                                            # Broad Transition variant — small
                                            # tracking gap pre-2024 but no free
                                            # ESG-screened sub-index history
                                            # exists pre-2017).

    - id: em_asia
      name: Amundi PEA Asie Emergente (MSCI Emerging Asia)
      isin: FR0013412012
      yahoo: PAASI.PA
      ter_pct: 0.30
      replication: synthetic
      region: em_asia
      inception: 2018-12-19
      index_proxy: EEMA                     # iShares MSCI EM Asia ETF — US-
      index_proxy_kind: usd_tr              # listed (USD), distributing but
                                            # auto_adjust=True gives TR-
                                            # equivalent close. Since
                                            # 2012-02-09 — earliest free source
                                            # for clean MSCI EM Asia exposure;
                                            # no 2008-2011 history without
                                            # paid data.

    - id: japan_hedged
      name: Amundi PEA Japon (TOPIX) EUR Hedged
      isin: FR0013411998
      yahoo: PTPXH.PA               # verified via Boursorama
      ter_pct: 0.48
      replication: synthetic
      region: japan
      inception: 2019-04-25
      index_proxy: IJPE.L                   # iShares MSCI Japan EUR Hedged
      index_proxy_kind: eur_tr              # UCITS ETF Acc on LSE, EUR-quoted
                                            # (EUR 130.51 spot), since
                                            # 2010-09-30. Index-swap proxy:
                                            # MSCI Japan (~230 large/mid) vs
                                            # TOPIX (~1700 names) — historical
                                            # R² ~0.95; EUR-hedge mechanism
                                            # identical (the part the strategy
                                            # is testing).

    - id: eu_banks
      name: Amundi STOXX Europe 600 Banks
      isin: LU1834983477
      yahoo: BNK.PA                 # ex-Lyxor, on Yahoo since 2006-08-25
      ter_pct: 0.30
      replication: synthetic
      region: europe
      inception: 2006-08-25         # native data covers full 2012-02 window
      # No `index_proxy` configured: BNK.PA's own history goes back to
      # before our 2012-02 backtest start. Optional belt-and-braces would
      # be `index_proxy: EXV1.DE` (iShares STOXX 600 Banks Dist on Xetra,
      # since 2001-04-25, kind eur_tr via auto_adjust).

    - id: eu_50
      name: Amundi Core EURO STOXX 50
      isin: LU1681047236
      yahoo: C50.PA                 # verified via Boursorama
      ter_pct: 0.09
      replication: synthetic
      region: eurozone
      inception: 2017-09-29
      index_proxy: CSX5.AS                  # iShares Core EURO STOXX 50 ETF
      index_proxy_kind: eur_tr              # EUR Acc on Amsterdam, since
                                            # 2010-01-26. Loses pre-2010 vs
                                            # ^STOXX50E but TR matches live
                                            # ETF (no PR understatement). NB:
                                            # `EUE.AS` doesn't exist on Yahoo
