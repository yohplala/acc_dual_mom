                                            # EUEA.AS).

  safe_asset:
    id: safe
    name: Amundi PEA Euro Court Terme
    isin: FR0013346681
    proxy: estr                   # synthetic price compounded from ECB €STR
    ter_pct: 0.25

  # How rows of assets are laid out in the signal table (Previous / New
  # allocation cells). Each strategy filters this layout to its actual
  # universe — assets not used by a strategy simply don't appear.
  display_layout:
    - [world]
    - [us_large, us_small]
    - [eu_broad, eu_50]                         # broad-cap Europe alternatives
    - [eu_small, eu_banks]                      # eurozone sub-exposures
    - [em_asia]
    - [japan_hedged, japan_unhedged]            # FX-hedged & unhedged TOPIX
    - [safe]

# Strategies. Conventions under the new rank-only methodology:
# - `safe` is just another listable asset. Include it in `assets:` to give
#   it a chance to win the top-N during crashes (small positive €STR score
#   beats deeply-negative equity scores). Strategies without `safe` listed
#   fall through to a 0%-return CASH placeholder when no candidate passes
#   the >0 floor.
# - `eu_50` (EURO STOXX 50, eurozone, TER 0.09%) is preferred over `eu_broad`
#   (MSCI Europe, broader, TER 0.15%) for the core: lower TER, deeper
#   liquidity, and the correlation-page rep within the European
#   large-cap-equivalent group.
# - `world` and `eu_small` retired from the core slots — `world` was
#   contributing leaky US exposure on top of `us_large`, and `eu_small`
#   was carrying spread cost without uncorrelated alpha vs `eu_50`.
strategies:
  # ── HEADLINE: core 6-asset rotation in 4 lookback variants ─────────────
  # Universe: 5 risky equity sleeves + safe. Same universe across all four
  # core variants so the only difference is the scoring lookback and top_n.
  - name: core_monthly
    description: 6-asset core, monthly, accelerated 1m/3m/6m mean, equal-weight top-3
    assets: [us_large, us_small, eu_50, em_asia, japan_hedged, safe]
    rebalance: monthly_first_sunday
    top_n: 3

  - name: core_monthly_top1
    description: 6-asset core, monthly, accelerated 1m/3m/6m mean, top-1 (single-leader concentration)
    assets: [us_large, us_small, eu_50, em_asia, japan_hedged, safe]
    rebalance: monthly_first_sunday
    top_n: 1

  # Single 6-month lookback (Antonacci's "moderate" dual-momentum variant).
  - name: core_monthly_top1_dm_6m
    description: 6-asset core, monthly, single 6-month lookback, top-1
    assets: [us_large, us_small, eu_50, em_asia, japan_hedged, safe]
    rebalance: monthly_first_sunday
    top_n: 1
    lookbacks_days: [126]

  # Single 12-month lookback (Antonacci's classic dual-momentum variant).
  - name: core_monthly_top1_dm_12m
    description: 6-asset core, monthly, single 12-month lookback, top-1
    assets: [us_large, us_small, eu_50, em_asia, japan_hedged, safe]
    rebalance: monthly_first_sunday
    top_n: 1
    lookbacks_days: [252]

  # ── SENSITIVITY EXHIBITS on the same core universe ────────────────────
  # Score-proportional weighting (vs the equal_weight default).
  - name: core_monthly_score_prop
    description: 6-asset core, monthly, accelerated, score-proportional weighting (sensitivity)
    assets: [us_large, us_small, eu_50, em_asia, japan_hedged, safe]
    rebalance: monthly_first_sunday
    top_n: 3
    allocation_rule: score_proportional

  # Weekly cadence on the same universe (cost-drag exhibit).
  - name: core_weekly
    description: 6-asset core, weekly, accelerated, top-3 (cost-drag exhibit)
    assets: [us_large, us_small, eu_50, em_asia, japan_hedged, safe]
    rebalance: weekly_sunday
    top_n: 3

  # Top-3 single-lookback variants (paired with the top-1 dm_6m / dm_12m
  # above to disentangle the "concentration" effect from the "lookback"
  # effect).
  - name: core_monthly_dm_6m
    description: 6-asset core, monthly, single 6-month lookback, top-3
    assets: [us_large, us_small, eu_50, em_asia, japan_hedged, safe]
    rebalance: monthly_first_sunday
    top_n: 3
    lookbacks_days: [126]

  - name: core_monthly_dm_12m
    description: 6-asset core, monthly, single 12-month lookback, top-3
    assets: [us_large, us_small, eu_50, em_asia, japan_hedged, safe]
    rebalance: monthly_first_sunday
    top_n: 3
    lookbacks_days: [252]

  # ── SECTOR TILT EXPERIMENT ─────────────────────────────────────────────
  # Adds eu_banks. NB: eu_banks is ~17% of EURO STOXX 50, so eu_50 + eu_banks
  # are not orthogonal exposures — top-N picks the stronger of the two when
  # both clear the >0 floor. Per Quantpedia, sector-momentum alpha has
  # decayed post-2010; keep this as an experiment, not a core allocation.
  - name: sector_satellite_monthly
    description: 6-asset core + EU banks sector tilt, monthly, accelerated
    assets: [us_large, us_small, eu_50, em_asia, japan_hedged, eu_banks, safe]
    rebalance: monthly_first_sunday
    top_n: 3

  # ── HEAD-TO-HEAD: Japan FX-hedged vs unhedged ─────────────────────────
  # Isolates the FX-hedge cost/benefit. Both sleeves have the same equity
  # exposure (TOPIX); the difference is whether daily JPY/EUR moves enter
  # the score signal (unhedged) or are stripped out (hedged). Includes safe
  # so the strategy can defend during JP-equity drawdowns.
  - name: japan_hedge_vs_unhedge_adm_monthly
    description: Hedged vs unhedged Japan ADM rotation, monthly top-1
    assets: [japan_hedged, japan_unhedged, safe]
    rebalance: monthly_first_sunday
    top_n: 1

  # ── METHODOLOGICAL BASELINES (pre-existing, kept) ─────────────────────
  # Antonacci-style "Absolute Momentum": single risky asset gated by the
  # safe-asset rank. With safe in the universe and top_n=1, this is exactly
  # the rank-only equivalent of Antonacci's classic absolute-momentum spec.
  - name: us_only_abs_mom_monthly
    description: US-only single-asset rotation (us_large vs safe), monthly top-1
    assets: [us_large, safe]
    rebalance: monthly_first_sunday
    top_n: 1

  # GEM-style proxy: S&P 500 vs MSCI World vs safe, top-1 per month.
  # Antonacci's original GEM was SPY vs ACWI ex-US; MSCI World is ~70% US,
  # so this is leakier than the original but the closest clean PEA analog
  # with continuous history.
  - name: gem_us_world_monthly
    description: GEM-style proxy, monthly top-1 between us_large / world / safe
    assets: [us_large, world, safe]
    rebalance: monthly_first_sunday
    top_n: 1

  # ── BUY-AND-HOLD BENCHMARKS (zero-cost references) ────────────────────
  - name: msci_world_buy_hold
    description: 100% MSCI World buy-and-hold (zero-cost benchmark)
    mode: buy_and_hold
    assets: [world]
    rebalance: monthly_first_sunday
    top_n: 1

  - name: world3_buy_hold
    description: 1/3 each S&P 500 + Euro Stoxx 50 + Emerging Asia, buy-and-hold
    mode: buy_and_hold
    assets: [us_large, eu_50, em_asia]
    rebalance: monthly_first_sunday
    top_n: 3

  # Static 60/40: 60% world + 40% safe, never rebalanced. The canonical
  # static benchmark - every rotation strategy here should beat it after
  # costs to justify its complexity.
  - name: static_60_40
    description: Static 60% world + 40% safe, never rebalanced (canonical benchmark)
    mode: buy_and_hold
    assets: [world]
    rebalance: monthly_first_sunday
    top_n: 1
    static_weights:
      world: 0.6
      safe: 0.4

  # ── WORLD-CENTRIC ROTATIONS (kept for continuity with previous lineup) ──
  - name: world_jp_hedge_adm_monthly
    description: ADM rotation between MSCI World, Japan-hedged, and safe; monthly top-1
    assets: [world, japan_hedged, safe]
    rebalance: monthly_first_sunday
    top_n: 1

  - name: world3_jp_hedge_adm_monthly
    description: ADM rotation across S&P 500 + Euro Stoxx 50 + EM Asia + Japan-hedged + safe; monthly top-3
    assets: [us_large, eu_50, em_asia, japan_hedged, safe]
    rebalance: monthly_first_sunday
    top_n: 3
