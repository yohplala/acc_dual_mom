    ter_pct: 0.25

# Three strategies sharing the same 6-asset universe to isolate the
# rebalance-frequency effect (weekly vs. biweekly vs. monthly).
strategies:
  - name: core_monthly
    description: 6-asset core, monthly first-Sunday rebalance
    assets: [us_large, us_small, eu_broad, eu_small, em_asia, world]
    rebalance: monthly_first_sunday
    top_n: 3

  - name: core_biweekly
    description: 6-asset core, biweekly Sunday rebalance
    assets: [us_large, us_small, eu_broad, eu_small, em_asia, world]
    rebalance: biweekly_sunday
    reference_date: 2020-01-05    # anchors the biweekly cycle
    top_n: 3

  - name: core_weekly
    description: 6-asset core, weekly Sunday rebalance
    assets: [us_large, us_small, eu_broad, eu_small, em_asia, world]
    rebalance: weekly_sunday
    top_n: 3
