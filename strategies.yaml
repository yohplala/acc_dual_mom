# PEA momentum framework — strategy configurations.
#
# Asset metadata lives in `pea_universe.yaml` (the single asset catalog).
# This file holds:
# - `shared:` config (scoring / allocation / cost / execution defaults)
# - `display_layout:` for the signal table's region grouping
# - `strategies:` — each entry's `assets:` list references catalog ids
#   from `pea_universe.yaml`
#
# Active assets (those referenced by some strategy below) carry the
# strategy-relevant fields (region, est_spread_bps, index_proxy,
# inception, replication, synth_proxy) inline on their pea_universe.yaml
# entry. The 100+ unused catalog entries are unaffected.

shared:
  scoring:
    # Lookback windows in trading days, averaged with `aggregation`.
    # 21 ≈ 1 month, 63 ≈ 3 months, 126 ≈ 6 months.
    lookbacks_days: [21, 63, 126]
    aggregation: mean

  allocation:
    # Default weighting rule across selected top-N. Canonical Antonacci ADM
    # is `equal_weight` (1/N). The alternative `score_proportional` weights
    # by score (s_i / sum(s_j)) — kept as an opt-in sensitivity exhibit:
    # set `allocation_rule: score_proportional` on a per-strategy entry to
    # override (see `core_sp_m_t3` below).
    rule: equal_weight
    granularity_pct: 10           # round weights to 10% steps
    rounding: largest_remainder   # Hare quota for fair rounding

  costs:
    # One-way broker commission. Per-asset bid-ask spread is added separately
    # via `est_spread_bps` on each catalog entry (half-spread per traded notional).
    per_trade_pct: 0.05

  execution:
    # Sunday-anchored cadence: signal uses preceding Friday close,
    # fill at following Monday close (one trading-day lag, no lookahead).
    signal_close: friday
    fill_close: monday

# Strategies. Conventions under the rank-only methodology:
# - Include `cash_estr` in `assets:` to give safe a chance to
#   win the top-N during crashes (small positive €STR score beats deeply-
#   negative equity scores). Strategies without it fall through to a
#   0%-return CASH placeholder when no candidate passes the >0 floor.
# - `eurostoxx50` (EURO STOXX 50, eurozone, TER 0.09%) is preferred
#   over `msci_europe` (MSCI Europe, broader, TER 0.15%) for the
#   core: lower TER, deeper liquidity, and the correlation-page rep
#   within the European large-cap-equivalent group.
# - `world` and `emu_small` retired from the core slots —
#   `world` was contributing leaky US exposure on top of
#   `sp500`, and `emu_small` carried spread cost without
#   uncorrelated alpha vs `eurostoxx50`.
strategies:
  # ── HEADLINE: core 6-asset rotation in 4 lookback variants ─────────────
  # Universe: 5 risky equity sleeves + safe. Same universe across all four
  # core variants so the only difference is the scoring lookback and top_n.
  - name: core_adm_m_t3
    description: 6-asset core, monthly, accelerated 1m/3m/6m mean, equal-weight top-3
    assets: [sp500, russell2000, eurostoxx50, em_asia, topix, cash_estr]
    rebalance: monthly_first_sunday
    top_n: 3

  - name: core_adm_m_t1
    description: 6-asset core, monthly, accelerated 1m/3m/6m mean, top-1 (single-leader concentration)
    assets: [sp500, russell2000, eurostoxx50, em_asia, topix, cash_estr]
    rebalance: monthly_first_sunday
    top_n: 1

  # Single 6-month lookback (Antonacci's "moderate" dual-momentum variant).
  - name: core_dm6_m_t1
    description: 6-asset core, monthly, single 6-month lookback, top-1
    assets: [sp500, russell2000, eurostoxx50, em_asia, topix, cash_estr]
    rebalance: monthly_first_sunday
    top_n: 1
    lookbacks_days: [126]

  # Single 12-month lookback (Antonacci's classic dual-momentum variant).
  - name: core_dm12_m_t1
    description: 6-asset core, monthly, single 12-month lookback, top-1
    assets: [sp500, russell2000, eurostoxx50, em_asia, topix, cash_estr]
    rebalance: monthly_first_sunday
    top_n: 1
    lookbacks_days: [252]

  # ── SENSITIVITY EXHIBITS on the same core universe ────────────────────
  # Score-proportional weighting (vs the equal_weight default).
  - name: core_sp_m_t3
    description: 6-asset core, monthly, accelerated, score-proportional weighting (sensitivity)
    assets: [sp500, russell2000, eurostoxx50, em_asia, topix, cash_estr]
    rebalance: monthly_first_sunday
    top_n: 3
    allocation_rule: score_proportional

  # Weekly cadence on the same universe (cost-drag exhibit).
  - name: core_adm_w_t3
    description: 6-asset core, weekly, accelerated, top-3 (cost-drag exhibit)
    assets: [sp500, russell2000, eurostoxx50, em_asia, topix, cash_estr]
    rebalance: weekly_sunday
    top_n: 3

  # Top-3 single-lookback variants (paired with the top-1 dm_6m / dm_12m
  # above to disentangle the "concentration" effect from the "lookback"
  # effect).
  - name: core_dm6_m_t3
    description: 6-asset core, monthly, single 6-month lookback, top-3
    assets: [sp500, russell2000, eurostoxx50, em_asia, topix, cash_estr]
    rebalance: monthly_first_sunday
    top_n: 3
    lookbacks_days: [126]

  - name: core_dm12_m_t3
    description: 6-asset core, monthly, single 12-month lookback, top-3
    assets: [sp500, russell2000, eurostoxx50, em_asia, topix, cash_estr]
    rebalance: monthly_first_sunday
    top_n: 3
    lookbacks_days: [252]

  # ── SECTOR TILT EXPERIMENT ─────────────────────────────────────────────
  # Adds eu_banks. NB: banks is ~17% of EURO STOXX 50, so
  # eurostoxx50 + eu_banks are not orthogonal exposures —
  # top-N picks the stronger of the two when both clear the >0 floor.
  # Per Quantpedia, sector-momentum alpha has decayed post-2010; keep this
  # as an experiment, not a core allocation.
  - name: banks_adm_m_t3
    description: 6-asset core + EU banks sector tilt, monthly, accelerated
    assets: [sp500, russell2000, eurostoxx50, em_asia, topix, eu_banks, cash_estr]
    rebalance: monthly_first_sunday
    top_n: 3

  # ── HEAD-TO-HEAD: Japan vs cash ───────────────────────────────────────
  # Single-risky-asset rotation between TOPIX (unhedged) and the safe sleeve.
  # FX noise feeds into the score signal — but EUR-hedged Japan ETFs only
  # have post-2010 history (no usable proxy pre-2010), so the active lineup
  # standardised on unhedged `topix` (EWJ-stitched back to 1996) for
  # full GFC-spanning backtests across all Japan-bearing strategies.
  - name: jp_adm_m_t1
    description: Japan ADM rotation (topix vs safe), monthly top-1
    assets: [topix, cash_estr]
    rebalance: monthly_first_sunday
    top_n: 1

  # ── METHODOLOGICAL BASELINES ──────────────────────────────────────────
  # Antonacci-style "Absolute Momentum": single risky asset gated by the
  # safe-asset rank. With safe in the universe and top_n=1, this is exactly
  # the rank-only equivalent of Antonacci's classic absolute-momentum spec.
  - name: us_adm_m_t1
    description: US-only single-asset rotation (S&P 500 vs safe), monthly top-1
    assets: [sp500, cash_estr]
    rebalance: monthly_first_sunday
    top_n: 1

  # GEM-style proxy: S&P 500 vs MSCI World vs safe, top-1 per month.
  # Antonacci's original GEM was SPY vs ACWI ex-US; MSCI World is ~70% US,
  # so this is leakier than the original but the closest clean PEA analog
  # with continuous history.
  - name: gem_adm_m_t1
    description: GEM-style proxy, monthly top-1 between S&P 500 / MSCI World / safe
    assets: [sp500, world, cash_estr]
    rebalance: monthly_first_sunday
    top_n: 1

  # ── BUY-AND-HOLD BENCHMARKS (zero-cost references) ────────────────────
  - name: world_bh
    description: 100% MSCI World buy-and-hold (zero-cost benchmark)
    mode: buy_and_hold
    assets: [world]
    rebalance: monthly_first_sunday
    top_n: 1

  # Pure SPX buy-and-hold — zero-cost, no proxy ambiguity (SPY since 1993),
  # the cleanest 2008-spanning equity reference. Every rotation strategy
  # whose universe is a superset of {sp500, cash_estr} should be measurable
  # against this through the GFC.
  - name: sp500_bh
    description: 100% S&P 500 buy-and-hold (GFC-spanning equity benchmark)
    mode: buy_and_hold
    assets: [sp500]
    rebalance: monthly_first_sunday
    top_n: 1

  # ── Per-asset B&H benchmarks for the Asia regional page ─────────────
  # Pure 100%-of-one-sleeve buy-and-hold, one per Asian ETF. Used as
  # head-to-head datapoints on the Asia regional comparison page so the
  # best-CAGR-since-2008 sleeve is identifiable on a single chart.
  - name: em_asia_bh
    description: 100% Emerging Asia buy-and-hold (GFC-spanning)
    mode: buy_and_hold
    assets: [em_asia]
    rebalance: monthly_first_sunday
    top_n: 1

  - name: topix_bh
    description: 100% Japan TOPIX (unhedged) buy-and-hold (GFC-spanning)
    mode: buy_and_hold
    assets: [topix]
    rebalance: monthly_first_sunday
    top_n: 1

  - name: topix_hedged_bh
    description: 100% Japan TOPIX (EUR-hedged) buy-and-hold (GFC-spanning via synthetic pre-2010)
    mode: buy_and_hold
    assets: [topix_hedged]
    rebalance: monthly_first_sunday
    top_n: 1

  - name: world3_bh
    description: 1/3 each S&P 500 + Euro Stoxx 50 + Emerging Asia, buy-and-hold
    mode: buy_and_hold
    assets: [sp500, eurostoxx50, em_asia]
    rebalance: monthly_first_sunday
    top_n: 3

  # Emerging-Asia-tilted variant of world3_bh: 30% em_asia + 50% sp500 +
  # 20% eurostoxx50, never rebalanced. Direct comparison with world3_bh
  # to test whether overweighting EM and underweighting Europe pays off
  # over the backtest window.
  - name: world3_em_bh
    description: 30% Emerging Asia + 50% S&P 500 + 20% Euro Stoxx 50, buy-and-hold
    mode: buy_and_hold
    assets: [em_asia, sp500, eurostoxx50]
    rebalance: monthly_first_sunday
    top_n: 3
    static_weights:
      em_asia: 0.3
      sp500: 0.5
      eurostoxx50: 0.2

  # 3-asset static benchmark adding Japan to the world3 mix:
  # 30% em_asia + 50% sp500 + 20% topix, never rebalanced. Comparison vs
  # world3_bh / world3_em_bh tests whether Japan exposure adds anything as
  # a static sleeve. (No EU here — removing eurostoxx50.) Spans GFC via
  # the EWJ proxy on topix.
  - name: wld3_noeu_uh_bh
    description: 30% Emerging Asia + 50% S&P 500 + 20% Japan, buy-and-hold (GFC-spanning)
    mode: buy_and_hold
    assets: [em_asia, sp500, topix]
    rebalance: monthly_first_sunday
    top_n: 3
    static_weights:
      em_asia: 0.3
      sp500: 0.5
      topix: 0.2

  # 4-asset static benchmark adding Japan to the world3 mix:
  # 30% em_asia + 30% sp500 + 20% eurostoxx50 + 20% topix, never
  # rebalanced. Comparison vs world3_bh / world3_em_bh tests whether
  # Japan exposure adds anything as a static sleeve.
  - name: wld4_nohdg_bh
    description: 30% Emerging Asia + 30% S&P 500 + 20% Euro Stoxx 50 + 20% Japan, buy-and-hold
    mode: buy_and_hold
    assets: [em_asia, sp500, eurostoxx50, topix]
    rebalance: monthly_first_sunday
    top_n: 4
    static_weights:
      em_asia: 0.3
      sp500: 0.3
      eurostoxx50: 0.2
      topix: 0.2

  # Static 60/40: 60% world + 40% safe, never rebalanced. The canonical
  # static benchmark — every rotation strategy here should beat it after
  # costs to justify its complexity.
  - name: world_60_40_bh
    description: Static 60% world + 40% safe, never rebalanced (canonical benchmark)
    mode: buy_and_hold
    assets: [world, cash_estr]
    rebalance: monthly_first_sunday
    top_n: 1
    static_weights:
      world: 0.6
      cash_estr: 0.4

  # ── WORLD-CENTRIC ROTATIONS (kept for continuity with previous lineup) ──
  - name: world_jp_m_t1
    description: ADM rotation between MSCI World, Japan, and safe; monthly top-1
    assets: [world, topix, cash_estr]
    rebalance: monthly_first_sunday
    top_n: 1

  - name: world3_jp_m_t3
    description: ADM rotation across S&P 500 + Euro Stoxx 50 + EM Asia + Japan + safe; monthly top-3
    assets: [sp500, eurostoxx50, em_asia, topix, cash_estr]
    rebalance: monthly_first_sunday
    top_n: 3

  # ── SEMIANNUAL TREND-CAPTURE: 4 non-overlapping regions, top-1 ──────────
  # 4 geographically disjoint sleeves (US / Eurozone / EM Asia / Japan),
  # single 6-month lookback, top-1 100%-weight, rebalanced only twice a year
  # (first Sunday of January and first Sunday of July). Rationale: pick the
  # leader per semester and let the country trend run, with minimal turnover.
  # Japan is unhedged (`topix` via EWJ proxy back to 1996) — EUR-hedged
  # Japan would be cleaner on the score signal but has no pre-2010 history,
  # so the lineup uses unhedged for GFC-spanning backtests. All-negative-
  # momentum case falls through to the 0%-return CASH placeholder — to
  # opt-in to €STR yield during crashes, add cash_estr to `assets:`.
  - name: world4_dm6_s_t1
    description: 4-region rotation (US/EU/EM-Asia/JP), DM 6m, semiannual top-1
    assets: [sp500, eurostoxx50, em_asia, topix]
    rebalance: semiannual_first_sunday
    top_n: 1
    lookbacks_days: [126]

  # Same setup as world4_dm6_s_t1 but with cash_estr in the universe so the
  # strategy can rotate to the safe sleeve in deep crashes (rank-only
  # absolute-momentum equivalent: when all 4 risky scores collapse below 0,
  # cash_estr's small €STR-positive score wins top-1 and the portfolio
  # goes 100% cash). Trades a small fraction of bull-market upside (cash
  # very rarely wins the rank in trending regimes) for real GFC-style
  # crash protection. Drawback at top-1 over 4 risky: cash needs to beat
  # ALL 4 risky scores simultaneously to enter, so the defensive trigger
  # is rare — meaningful only in synchronised global selloffs.
  - name: world4safe_dm6_s_t1
    description: 4 regions + cash, DM 6m, semiannual top-1
    assets: [sp500, eurostoxx50, em_asia, topix, cash_estr]
    rebalance: semiannual_first_sunday
    top_n: 1
    lookbacks_days: [126]

  # ── EXPERT PROPOSAL: 4 disjoint regions + cash, single 12m DM, top-3 ─────
  # Rationale: clean geographic universe (no US double-counting like the
  # 6-asset core's sp500+russell2000 overlap), single 12-month lookback
  # (Antonacci's classic GEM horizon — most robust signal in the analyst's
  # 14y review and in the academic literature for time-series country
  # momentum), top-3 equal-weight (analyst found top-3 dominates top-1 at
  # this lookback by ~150bp CAGR + ~6pp lower MaxDD), monthly cadence
  # (cost-efficient: signal stickiness on 12m + monthly produces ~6-10
  # real position changes/year). cash_estr in the universe ⇒ rank-only
  # absolute-momentum equivalent: when all equity scores collapse below
  # zero in a crash, €STR's small positive score wins the rank → defensive
  # tilt automatic. The reason to do momentum rotation in the first place.
  - name: geo4safe_dm12_m_t3
    description: 4 disjoint regions + cash, single 12m DM, monthly top-3 equal-weight
    assets: [sp500, eurostoxx50, em_asia, topix, cash_estr]
    rebalance: monthly_first_sunday
    top_n: 3
    lookbacks_days: [252]

  # ── 3-region quarterly trend-capture (no EU) + cash ───────────────────
  # 3 disjoint risky sleeves (US / EM Asia / Japan unhedged) + cash_estr,
  # single 6-month lookback, top-1 100%-weight, rebalanced quarterly
  # (1st Sunday of Jan/Apr/Jul/Oct). Rotation analog of wld3_noeu_uh_bh:
  # same risky universe with the same DM6 signal that world4_dm6_s_t1
  # uses, but quarterly cadence (4× per year vs 2×) and a 3-region mix
  # that drops eurostoxx50. Spans GFC fully via the EWJ-stitched topix
  # proxy. cash_estr in the universe ⇒ rank-only absolute-momentum
  # equivalent: when all 3 risky scores collapse below zero in a crash,
  # €STR's small positive score wins top-1 and the strategy goes 100%
  # cash with €STR yield (vs falling through to a 0%-return placeholder).
  - name: geo3_dm6_q_t1
    description: 3 regions + cash, DM 6m, quarterly top-1
    assets: [sp500, em_asia, topix, cash_estr]
    rebalance: quarterly_first_sunday
    top_n: 1
    lookbacks_days: [126]

  # ── REGIONAL WINNERS: best DM-X per region, score-proportional ───────
  # `selection_rule: top_1_per_region` reuses the standard DM/ADM
  # scoring framework — `lookbacks_days` and the shared aggregation
  # method drive scoring exactly as for any other strategy — and only
  # changes the *selection* step: at each rebalance, group all scored
  # assets by `discover.dashboard_bucket(category)` and keep the
  # highest-scoring asset within each {us, europe, asia} bucket. The
  # filtered (≤ 3-entry) scores dict then enters the regular top_n +
  # score-proportional weighting + largest-remainder rounding pipeline.
  #
  # Both strategies share the same 33-asset candidate pool (every
  # auto-gen-eligible US / Europe / Asia ETF) and the same selection
  # rule + score-proportional allocation; they differ only in lookback
  # length (12m vs 18m) and rebalance cadence (quarterly vs monthly).
  - name: regional_dm12_sp_q_t3
    description: Best DM 12m per region (US/EU/Asia), score-proportional, quarterly top-3
    assets: [
      sp500, russell2000, us_pea_nasdaq, sp500_hedged, sp500_screened, sp500_scr_hed,
      us_msci_esg, us_pea_us_tech, us_value, us_industrials,
      eurostoxx50, msci_europe, de_dax_dr, fr_cac40_acc, it_ftse_mib_acc, es_ibex_acc,
      eu_banks, sec_healthcare_acc, emu_msci_emu_acc, emu_ii_acc, emu_high_div,
      emu_small, emu_esg_broad_acc, emu_esg_select_acc, it_mib_esg, gr_msci_greece,
      em_asia, topix, topix_hedged, ap_asia_pacific, in_pea_india, cn_pea_china, em_pea_emerging,
    ]
    rebalance: quarterly_first_sunday
    top_n: 3
    lookbacks_days: [252]
    allocation_rule: score_proportional
    selection_rule: top_1_per_region

  - name: regional_dm18_sp_m_t3
    description: Best DM 18m per region (US/EU/Asia), score-proportional, monthly top-3
    assets: [
      sp500, russell2000, us_pea_nasdaq, sp500_hedged, sp500_screened, sp500_scr_hed,
      us_msci_esg, us_pea_us_tech, us_value, us_industrials,
      eurostoxx50, msci_europe, de_dax_dr, fr_cac40_acc, it_ftse_mib_acc, es_ibex_acc,
      eu_banks, sec_healthcare_acc, emu_msci_emu_acc, emu_ii_acc, emu_high_div,
      emu_small, emu_esg_broad_acc, emu_esg_select_acc, it_mib_esg, gr_msci_greece,
      em_asia, topix, topix_hedged, ap_asia_pacific, in_pea_india, cn_pea_china, em_pea_emerging,
    ]
    rebalance: monthly_first_sunday
    top_n: 3
    lookbacks_days: [378]
    allocation_rule: score_proportional
    selection_rule: top_1_per_region

  - name: regional_dm6_sp_m_t3
    description: Best DM 6m per region (US/EU/Asia), score-proportional, monthly top-3
    assets: [
      sp500, russell2000, us_pea_nasdaq, sp500_hedged, sp500_screened, sp500_scr_hed,
      us_msci_esg, us_pea_us_tech, us_value, us_industrials,
      eurostoxx50, msci_europe, de_dax_dr, fr_cac40_acc, it_ftse_mib_acc, es_ibex_acc,
      eu_banks, sec_healthcare_acc, emu_msci_emu_acc, emu_ii_acc, emu_high_div,
      emu_small, emu_esg_broad_acc, emu_esg_select_acc, it_mib_esg, gr_msci_greece,
      em_asia, topix, topix_hedged, ap_asia_pacific, in_pea_india, cn_pea_china, em_pea_emerging,
    ]
    rebalance: monthly_first_sunday
    top_n: 3
    lookbacks_days: [126]
    allocation_rule: score_proportional
    selection_rule: top_1_per_region

  - name: regional_dm6_sp_q_t3
    description: Best DM 6m per region (US/EU/Asia), score-proportional, quarterly top-3
    assets: [
      sp500, russell2000, us_pea_nasdaq, sp500_hedged, sp500_screened, sp500_scr_hed,
      us_msci_esg, us_pea_us_tech, us_value, us_industrials,
      eurostoxx50, msci_europe, de_dax_dr, fr_cac40_acc, it_ftse_mib_acc, es_ibex_acc,
      eu_banks, sec_healthcare_acc, emu_msci_emu_acc, emu_ii_acc, emu_high_div,
      emu_small, emu_esg_broad_acc, emu_esg_select_acc, it_mib_esg, gr_msci_greece,
      em_asia, topix, topix_hedged, ap_asia_pacific, in_pea_india, cn_pea_china, em_pea_emerging,
    ]
    rebalance: quarterly_first_sunday
    top_n: 3
    lookbacks_days: [126]
    allocation_rule: score_proportional
    selection_rule: top_1_per_region

  - name: regional_dm6_sp_s_t3
    description: Best DM 6m per region (US/EU/Asia), score-proportional, semiannual top-3
    assets: [
      sp500, russell2000, us_pea_nasdaq, sp500_hedged, sp500_screened, sp500_scr_hed,
      us_msci_esg, us_pea_us_tech, us_value, us_industrials,
      eurostoxx50, msci_europe, de_dax_dr, fr_cac40_acc, it_ftse_mib_acc, es_ibex_acc,
      eu_banks, sec_healthcare_acc, emu_msci_emu_acc, emu_ii_acc, emu_high_div,
      emu_small, emu_esg_broad_acc, emu_esg_select_acc, it_mib_esg, gr_msci_greece,
      em_asia, topix, topix_hedged, ap_asia_pacific, in_pea_india, cn_pea_china, em_pea_emerging,
    ]
    rebalance: semiannual_first_sunday
    top_n: 3
    lookbacks_days: [126]
    allocation_rule: score_proportional
    selection_rule: top_1_per_region

  # ── Static-weight regional family (US 60% / Asia 30% / EU 10%) ──
  # Same DM-6m-per-region scoring + selection as the `_sp_` family above,
  # but the regional split is fixed (no score_proportional). The momentum
  # scores still pick which asset wins inside each region — the regional
  # weights only decide the inter-region split. If a region has no asset
  # with enough history at a rebalance, its target weight is forfeited and
  # the remaining regions are renormalised proportionally.
  - name: regional_dm6_st_m_t3
    description: Best DM 6m per region (US/EU/Asia), static 60/30/10 split, monthly top-3
    assets: [
      sp500, russell2000, us_pea_nasdaq, sp500_hedged, sp500_screened, sp500_scr_hed,
      us_msci_esg, us_pea_us_tech, us_value, us_industrials,
      eurostoxx50, msci_europe, de_dax_dr, fr_cac40_acc, it_ftse_mib_acc, es_ibex_acc,
      eu_banks, sec_healthcare_acc, emu_msci_emu_acc, emu_ii_acc, emu_high_div,
      emu_small, emu_esg_broad_acc, emu_esg_select_acc, it_mib_esg, gr_msci_greece,
      em_asia, topix, topix_hedged, ap_asia_pacific, in_pea_india, cn_pea_china, em_pea_emerging,
    ]
    rebalance: monthly_first_sunday
    top_n: 3
    lookbacks_days: [126]
    selection_rule: top_1_per_region
    regional_weights:
      us: 0.6
      asia: 0.3
      europe: 0.1

