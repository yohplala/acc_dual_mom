  # How rows of assets are laid out in the signal table (Previous / New
  # allocation cells). Each strategy filters this layout to its actual
  # universe — assets not used by a strategy simply don't appear.
  display_layout:
    - [us_large, us_small]
    - [world]
    - [eu_broad, eu_emu, eu_50]                 # broad-cap Europe alternatives
    - [eu_small, eu_banks]                      # eurozone sub-exposures
    - [france, germany, italy, spain]           # eurozone single-country
    - [japan, japan_hedged]                     # FX hedging A/B
    - [em_asia, em_broad, china, india]         # emerging markets
    - [safe]

# Three strategies sharing the same 6-asset universe to isolate the
# rebalance-frequency effect (weekly vs. biweekly vs. monthly).
strategies:
  - name: core_monthly
    description: 6-asset core, monthly first-Sunday rebalance
    assets: [us_large, us_small, eu_broad, eu_small, em_asia, world]
    rebalance: monthly_first_sunday
    top_n: 3

  - name: core_biweekly
    description: 6-asset core, biweekly Sunday rebalance
    assets: [us_large, us_small, eu_broad, eu_small, em_asia, world]
    rebalance: biweekly_sunday
    reference_date: 2020-01-05    # anchors the biweekly cycle
    top_n: 3

  - name: core_weekly
    description: 6-asset core, weekly Sunday rebalance
    assets: [us_large, us_small, eu_broad, eu_small, em_asia, world]
    rebalance: weekly_sunday
    top_n: 3

  # Comparative variant of core_monthly: same cadence + same assets EXCEPT
  # the Europe sleeve is eurozone-only (eu_emu) instead of pan-European
  # (eu_broad). Lets the backtest empirically settle whether geographic
  # breadth helps the strategy on our specific universe and period — see
  # ADM literature for the theoretical case for `eu_broad`.
  - name: core_monthly_emu
    description: 6-asset core (eurozone Europe sleeve), monthly first-Sunday rebalance
    assets: [us_large, us_small, eu_emu, eu_small, em_asia, world]
    rebalance: monthly_first_sunday
    top_n: 3

  # Same 5 other sleeves as core_monthly, with `japan_hedged` swapped in
  # for `world`. Compares the value of an FX-hedged Japan exposure as the
  # 6th sleeve. Not a pure hedged-vs-unhedged A/B (would need a paired
  # `core_monthly_japan` for that) but answers "is hedged Japan a useful
  # 6th sleeve?" against the world-as-6th baseline.
  - name: core_monthly_japan_hedged
    description: 6-asset core with EUR-hedged Japan replacing world, monthly rebalance
    assets: [us_large, us_small, eu_broad, eu_small, em_asia, japan_hedged]
    rebalance: monthly_first_sunday
    top_n: 3

  # Pure geographic rotation across 9 single-country sleeves (US + 4 eurozone
  # + Japan + 3 emerging). Top-3 by accelerated-momentum score per rebalance.
  # Background: literature reports Sharpe ≈ 1.2 for 22-country / top-11 setups
  # (Logical Invest, QuantifiedStrategies). Our 9-country slice is on the
  # smaller side but covers the major geographies available within PEA.
  - name: country_rotation_monthly
    description: 9-country geographic rotation, monthly first-Sunday rebalance
    assets: [us_large, france, germany, italy, spain, japan, em_asia, china, india]
    rebalance: monthly_first_sunday
    top_n: 3

  # Core 6 sleeves + European banks as a sector tilt. Banks gets selected
  # only when its 1m/3m/6m momentum beats both the safe asset and the other
  # 6 sleeves. Acknowledges Quantpedia's caveat about post-2010 sector-momentum
  # alpha decay — keep this strategy as an experiment, not a core allocation.
  - name: sector_satellite_monthly
    description: 6-asset core + EU banks sector tilt, monthly first-Sunday rebalance
    assets: [us_large, us_small, eu_broad, eu_small, em_asia, world, eu_banks]
    rebalance: monthly_first_sunday
    top_n: 3

  # Concentrated 6-asset rotation with explicit theme structure:
  #   US:     us_large + us_small (cap-size split)
  #   Europe: eu_50 (eurozone large-cap broad) + eu_banks (sector tilt)
  #   Japan:  japan_hedged
  #   EM:     em_asia
  # Note: eu_banks is ~17% of EURO STOXX 50 — they're not orthogonal, but
  # momentum picks the stronger of the two when both clear the absolute filter.
  - name: core_concentrated_monthly
    description: 6-asset concentrated rotation (US split, EU broad+sector, JP hedged, EM Asia)
    assets: [us_large, us_small, eu_50, eu_banks, japan_hedged, em_asia]
    rebalance: monthly_first_sunday
    top_n: 3

  # Pure 100% MSCI World, never rebalanced — zero-cost baseline benchmark.
  # Strategy mode `buy_and_hold` allocates equal weights to `assets` on day
  # one and never rebalances. With a single-asset universe this means 100%
  # held throughout. `rebalance` and `top_n` are unused in this mode but
  # must be present.
  - name: msci_world_buy_hold
    description: 100% MSCI World buy-and-hold (zero-cost benchmark)
    mode: buy_and_hold
    assets: [world]
    rebalance: monthly_first_sunday
    top_n: 1

  # 3-leg buy-and-hold: 1/3 S&P 500 + 1/3 Euro Stoxx 50 + 1/3 Emerging Asia,
  # never rebalanced. Equal-weight buy_and_hold mode handles the 1/3 split
  # automatically. Compares against msci_world_buy_hold (single ETF) to show
  # whether explicit geographic split adds value over MSCI World's implicit
  # ~70% US / 28% non-US-developed weighting. Note: em_asia has no index
  # proxy yet so this strategy is limited to ~2018+ history.
  - name: world3_buy_hold
    description: 1/3 each S&P 500 + Euro Stoxx 50 + Emerging Asia, buy-and-hold
    mode: buy_and_hold
    assets: [us_large, eu_50, em_asia]
    rebalance: monthly_first_sunday
    top_n: 3
