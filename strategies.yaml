    - id: eu_50
      name: Amundi Core EURO STOXX 50
      isin: LU1681047236
      yahoo: C50.PA                 # verified via Boursorama
      ter_pct: 0.09
      est_spread_bps: 5            # eurozone large-cap flagship
      replication: synthetic
      region: eurozone
      inception: 2017-09-29
      index_proxy: CSX5.AS                  # iShares Core EURO STOXX 50 ETF
